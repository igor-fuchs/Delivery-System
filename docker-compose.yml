services:
  api:
    build:
      dockerfile: docker/Dockerfile
    container_name: delivery-system-api
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - /workspace/artifacts
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      Jwt__SecretKey: ${JWT__SECRET_KEY}
      Database__ConnectionString: ${DATABASE__CONNECTION_STRING}
      Redis__ConnectionString: ${REDIS__CONNECTION_STRING}
      Recaptcha__SecretKey: ${RECAPTCHA__SECRET_KEY}
      AdminSeed__Email: ${ADMIN_SEED__EMAIL}
      AdminSeed__Password: ${ADMIN_SEED__PASSWORD}
      Google__WebClientId: ${GOOGLE__WEB_CLIENT_ID}
      Resend__ApiKey: ${RESEND__API_KEY}
      Resend__FromEmail: ${RESEND__FROM_EMAIL}
      OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DATABASE__SA_PASSWORD}
      MSSQL_PID: ${DATABASE__MSSQL_PID}
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol/otel-collector-config.yaml"]
    volumes:
      - ./docker/observability/otel-collector-config.yaml:/etc/otelcol/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (used by the API)
      - "4318:4318"   # OTLP HTTP (optional, for debugging)
      - "8888:8888"   # Collector self-metrics (scraped by Prometheus)
    depends_on:
      - loki
      - tempo
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./docker/observability/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    volumes:
      - ./docker/observability/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana datasource)
      - "9095:9095"   # Tempo OTLP gRPC (OTel Collector → Tempo)
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  mimir:
    image: grafana/mimir:2.15.0
    container_name: mimir
    command: ["-config.file=/etc/mimir/mimir-config.yaml"]
    volumes:
      - ./docker/observability/mimir-config.yaml:/etc/mimir/mimir-config.yaml:ro
      - mimir-data:/data/mimir
    ports:
      - "19009:9009"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "-", "http://localhost:9009/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA__ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA__ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - loki
      - tempo
      - mimir
    restart: unless-stopped

volumes:
  sqlserver-data:
  loki-data:
  tempo-data:
  prometheus-data:
  mimir-data:
  grafana-data:
