services:
  api:
    build:
      dockerfile: docker/Dockerfile
    container_name: delivery-system-api
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - /workspace/artifacts
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      Jwt__SecretKey: ${JWT__SECRET_KEY}
      Database__ConnectionString: ${DATABASE__CONNECTION_STRING}
      Recaptcha__SecretKey: ${RECAPTCHA__SECRET_KEY}
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: delivery-system-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DATABASE__SA_PASSWORD}
      MSSQL_PID: ${DATABASE__MSSQL_PID}
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  sqlserver-data:
