receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 128

  batch:
    timeout: 5s
    send_batch_size: 8192

  # Defense-in-depth: redact attribute values matching PII patterns.
  # Primary PII prevention is at call sites in the application; this is a last-resort backstop.
  redaction:
    allow_all_keys: true
    blocked_values:
      - "(?i)password"
      - "(?i)secret"
      - "(?i)apikey"

exporters:
  # Traces → Tempo (OTLP gRPC)
  otlp/tempo:
    endpoint: tempo:9095
    tls:
      insecure: true

  # Logs → Loki via native OTLP endpoint (Loki 3.x, the standalone "loki" exporter
  # was removed from otelcol-contrib ≥ 0.108; otlphttp to /otlp is the correct path)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Metrics → Prometheus (remote write)
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, redaction, batch]
      exporters: [otlp/tempo]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, redaction, batch]
      exporters: [otlphttp/loki]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite]

  telemetry:
    logs:
      level: warn
