auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

limits_config:
  # Allow querying up to 30 days of logs.
  max_query_lookback: 720h
  # Reject individual log lines larger than 256 KB.
  max_line_size: 262144
  # Prevent log replay: reject pushes with timestamps older than 1 hour.
  reject_old_samples: true
  reject_old_samples_max_age: 1h

compactor:
  working_directory: /loki/boltdb-shipper-compactor
