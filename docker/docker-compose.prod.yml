services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: delivery-system-api-prod
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__SecretKey: ${JWT__SECRET_KEY}
      Database__ConnectionString: ${DATABASE__CONNECTION_STRING}
      Recaptcha__SecretKey: ${RECAPTCHA__SECRET_KEY}
      Google__WebClientId: ${GOOGLE__WEB_CLIENT_ID}
      AdminSeed__Email: ${ADMIN_SEED__EMAIL}
      AdminSeed__Password: ${ADMIN_SEED__PASSWORD}
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: delivery-system-sqlserver-prod
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DATABASE__SA_PASSWORD}
      MSSQL_PID: ${DATABASE__MSSQL_PID}
    volumes:
      - sqlserver-data-prod:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  sqlserver-data-prod:
